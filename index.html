<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />

    <!-- Theme Color for Browser UI -->
    <meta name="theme-color" content="#0F1B3D" />
    <link rel="apple-touch-icon" href="/Kochen/apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="/Kochen/favicon.png" />

    <!-- Apple PWA Configuration -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="KochPlan" />

    <!-- SEO Meta Tags -->
    <title>KochPlan - Dein intelligenter Essensplaner</title>
    <meta name="description" content="Plane deine Mahlzeiten, verwalte deine Einkaufslisten und entdecke neue Rezepte mit KochPlan - deiner smarten Küchen-App." />

    <!-- Preconnect to External Resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Format Detection -->
    <meta name="format-detection" content="telephone=no" />
    <meta name="color-scheme" content="light dark" />

    <style>
      /* Critical CSS for Initial Load */
      *, *::before, *::after {
        box-sizing: border-box;
      }

      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
      }

      html {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        background-color: #FFFBEB;
        color: #1F2937;
        overflow-x: hidden;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background-color: #1A1A1A;
          color: #F5F5F5;
        }
      }

      /* Loading State */
      #root:empty::before {
        content: '';
        display: block;
        width: 48px;
        height: 48px;
        border: 4px solid #FED7AA;
        border-top-color: #F97316;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      @keyframes spin {
        to { transform: translate(-50%, -50%) rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <noscript>
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center;font-family:'Inter',system-ui,sans-serif;background-color:#FFFBEB;color:#1F2937;">
        <h1 style="color:#F97316;margin-bottom:1rem;">JavaScript erforderlich</h1>
        <p>KochPlan benötigt JavaScript, um zu funktionieren. Bitte aktiviere JavaScript in deinen Browsereinstellungen.</p>
      </div>
    </noscript>
  </body>
</html>
